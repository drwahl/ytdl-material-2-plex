version: "3.9"
services:
  ytdl_sync:
    image: drwahl/ytdl-sync:latest
    container_name: ytdl_sync
    restart: unless-stopped
    environment:
      ## YTDL config
      YTDL_URL: http://ytdl.example.com
      YTDL_USER: user
      YTDL_PASSWORD: pass
      YTDL_API_KEY: keykeykey
      # YTDL_CLEANUP_SYNCED: "false"
      ## Plex config
      PLEX_URL: http://plex.local:32400
      PLEX_TOKEN: your_plex_token
      PLEX_MUSIC_SECTION_ID: "1"
      ## Directory config
      # Drop-off: ytdl files land here; tagging + organization runs on everything in this dir
      LOCAL_DOWNLOAD_DIR: /music/incoming
      # Organized library root: tagged files move to Artist/Album/ under this path
      PLEX_MUSIC_DIR: /music
      # LOG_PATH: /logs/ytdl_sync.log
      LOCK_FILE_PATH: /tmp/ytdl_sync.lock

    volumes:
      # Mount your music library (both incoming staging and organized library)
      - /path/on/host/music:/music:rw

      # Optional: mount a logs directory if LOG_PATH is set
      # - /path/on/host/logs:/logs:rw

    # Run once daily via external cron, or schedule here with restart: unless-stopped

